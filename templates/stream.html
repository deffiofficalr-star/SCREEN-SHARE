<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen Share — Просмотр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(ellipse at 50% 0%, #0d0d0d 0%, #050505 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(124, 58, 237, 0.03), transparent 60%);
            pointer-events: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .brand span {
            font-size: 22px;
        }

        .header h2 {
            color: #e5e7eb;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .status-badge {
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
            transition: 0.4s;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-badge.on {
            background: rgba(5, 150, 105, 0.1);
            color: #34d399;
            border-color: rgba(5, 150, 105, 0.15);
        }

        .status-badge.on .dot {
            background: #34d399;
            animation: pulse-dot 1.6s infinite;
        }

        .status-badge.off {
            background: rgba(107, 114, 128, 0.08);
            color: #9ca3af;
            border-color: rgba(107, 114, 128, 0.08);
        }

        .status-badge.off .dot {
            background: #6b7280;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }

        .video-container {
            background: #0a0a0a;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: opacity 0.15s;
        }

        .placeholder {
            color: #3a3a4a;
            font-size: 20px;
            text-align: center;
            padding: 20px;
            user-select: none;
        }

        .placeholder .big-icon {
            font-size: 72px;
            display: block;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .placeholder .title {
            font-size: 18px;
            color: #6b7280;
            font-weight: 500;
        }

        .placeholder .sub {
            font-size: 14px;
            color: #4b5563;
            margin-top: 6px;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #6b7280;
            font-size: 14px;
            margin-top: 14px;
            padding: 0 4px;
            position: relative;
            z-index: 1;
        }

        .info .fps-counter {
            color: #9ca3af;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 14px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(124, 58, 237, 0.2);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            border: none;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.35);
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .footer-mini {
            text-align: center;
            color: #3a3a4a;
            font-size: 12px;
            margin-top: 16px;
            letter-spacing: 0.3px;
        }

        .footer-mini a {
            color: #4b5563;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-mini a:hover {
            color: #6b7280;
        }

        @media (max-width: 600px) {
            .container {
                padding: 14px;
                border-radius: 20px;
            }
            .header h2 {
                font-size: 15px;
            }
            .status-badge {
                font-size: 11px;
                padding: 4px 12px;
            }
            .placeholder .big-icon {
                font-size: 48px;
            }
            .placeholder .title {
                font-size: 15px;
            }
            .btn {
                padding: 8px 16px;
                font-size: 12px;
            }
            .info {
                font-size: 12px;
                flex-direction: column;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <span>🖥️</span>
                <h2>Screen Share</h2>
            </div>
            <div class="status-badge off" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Ожидание</span>
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <div class="placeholder" id="placeholder">
                <span class="big-icon">📺</span>
                <div class="title">Ожидание трансляции</div>
                <div class="sub">Подключитесь к серверу</div>
            </div>
            <img id="screenImage" style="display:none;" alt="Экран" />
        </div>

        <div class="info">
            <span id="infoText">🔄 Подключение к серверу...</span>
            <span class="fps-counter" id="fpsCounter">FPS: 0</span>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="fullscreenBtn">⛶ На весь экран</button>
            <button class="btn" id="reconnectBtn">🔄 Переподключиться</button>
        </div>

        <div class="footer-mini">
            <a href="https://github.com/deffiofficalr-star/SCREEN-SHARE" target="_blank">GitHub</a>
            &nbsp;·&nbsp; Screen Share v1.0
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const socket = io('http://' + window.location.hostname + ':5000/screen');
        const screenImage = document.getElementById('screenImage');
        const placeholder = document.getElementById('placeholder');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const infoText = document.getElementById('infoText');
        const fpsCounter = document.getElementById('fpsCounter');
        const videoContainer = document.getElementById('videoContainer');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const reconnectBtn = document.getElementById('reconnectBtn');

        let frameCount = 0;
        let lastUpdate = Date.now();

        function updateStatus(connected, streaming) {
            if (connected && streaming) {
                statusBadge.className = 'status-badge on';
                statusText.textContent = 'Трансляция';
                infoText.textContent = '📺 Просмотр экрана в реальном времени';
            } else if (connected) {
                statusBadge.className = 'status-badge off';
                statusText.textContent = 'Ожидание';
                infoText.textContent = '✅ Подключено. Ожидание трансляции...';
            } else {
                statusBadge.className = 'status-badge off';
                statusText.textContent = 'Отключено';
                infoText.textContent = '❌ Соединение потеряно';
            }
        }

        socket.on('connect', () => {
            updateStatus(true, false);
        });

        socket.on('disconnect', () => {
            updateStatus(false, false);
            screenImage.style.display = 'none';
            placeholder.style.display = 'block';
        });

        socket.on('frame', (data) => {
            if (data.image) {
                screenImage.src = 'data:image/jpeg;base64,' + data.image;
                screenImage.style.display = 'block';
                placeholder.style.display = 'none';
                updateStatus(true, true);

                frameCount++;
                if (Date.now() - lastUpdate > 1000) {
                    fpsCounter.textContent = 'FPS: ' + frameCount;
                    frameCount = 0;
                    lastUpdate = Date.now();
                }
            }
        });

        socket.on('status', (data) => {
            console.log('Статус:', data.msg);
        });

        fullscreenBtn.addEventListener('click', () => {
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen();
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
            }
        });

        reconnectBtn.addEventListener('click', () => {
            socket.connect();
            infoText.textContent = '🔄 Переподключение...';
            setTimeout(() => {
                if (socket.connected) {
                    infoText.textContent = '✅ Переподключено';
                }
            }, 1000);
        });

        socket.on('connect_error', () => {
            infoText.textContent = '⚠️ Ошибка подключения. Переподключаемся...';
        });
    </script>
</body>
</html>
